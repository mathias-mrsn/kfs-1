default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --check
        language: system
        pass_filenames: false
        types_or:
          - rust
        require_serial: true

      - id: cargo-check
        name: cargo check
        entry: cargo check
        language: system
        pass_filenames: false
        require_serial: true

      - id: cargo-test
        name: cargo test
        entry: bash -lc 'CI=true cargo test'
        language: system
        pass_filenames: false
        stages:
          - pre-push
        require_serial: true
